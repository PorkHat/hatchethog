    ctx.save();
    ctx.translate(state.shakeX,state.shakeY);
    drawPainterSky(scroll);
    drawTiles(scroll);
    drawMudPatches();
    const actors=[...farmers.map(f=>({kind:'farmer',y:f.y,obj:f})),...tractors.map(t=>({kind:'tractor',y:t.y,obj:t}))].sort((a,b)=>a.y-b.y);
    for(const a of actors){ if(a.kind==='farmer') drawFarmer(a.obj); else drawTractor(a.obj); }
    drawPowerups();
    drawButcherShots();
    for(const h of hatchets) drawHatchet(h);
    drawParticles();
    drawHog();
    ctx.restore();
    drawUI();
    postProcess();
  }
  function loop(now){ const dt=clamp((now-state.last)/1000,0,1/20); state.last=now; update(dt); render(); requestAnimationFrame(loop); }
  reset(false); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
